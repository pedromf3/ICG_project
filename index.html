<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICG - Unified Scenario</title>
<style>
body {
margin: 0;
overflow: hidden;
background: #000000;
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

#WebGL-output {
width: 100vw;
height: 100vh;
}

#overlay {
position: fixed;
top: 14px;
left: 14px;
padding: 8px 12px;
background: rgba(0, 0, 0, 0.45);
color: #f2f2f2;
font-size: 13px;
letter-spacing: 0.4px;
border: 1px solid rgba(255, 255, 255, 0.2);
border-radius: 6px;
pointer-events: none;
}
</style>
</head>
<body>
<div id="WebGL-output"></div>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

<script type="importmap">
{
"imports": {
"three": "https://threejs.org/build/three.module.js",
"three/addons/": "https://threejs.org/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { buildCarrierModel } from "./aircraftCarrierModel.js";
import { buildF22Model } from "./f22Model.js";
import { buildUH1YModel } from "./uh-1yModel.js";

function disableModelArtificialLights(root) {
root.traverse((object) => {
if (object.isLight) {
object.visible = false;
return;
}

if (!object.isMesh || !object.material) {
return;
}

const materials = Array.isArray(object.material) ? object.material : [object.material];
for (const material of materials) {
if (material && "emissiveIntensity" in material) {
material.emissiveIntensity = 0;
}
}
});
}

function init() {
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x9fd6f5, 900, 3200);

const oceanGeometry = new THREE.PlaneGeometry(2600, 2600, 1, 1);
const oceanMaterial = new THREE.MeshPhongMaterial({
color: 0x0d2337,
specular: 0x284a66,
shininess: 35,
side: THREE.DoubleSide
});
const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
ocean.rotation.x = -Math.PI / 2;
ocean.position.y = -44;
ocean.receiveShadow = true;
scene.add(ocean);

const textureLoader = new THREE.TextureLoader();
const { carrierGroup, radarSpinner } = buildCarrierModel(textureLoader);
scene.add(carrierGroup);

const airplaneGroup = buildF22Model();
airplaneGroup.scale.setScalar(0.38);
const runwayAngle = Math.PI / 9.5;
const runwayCenterX = 17.5;
const runwayCenterZ = -2.5;
const runwayDirectionX = Math.sin(runwayAngle);
const runwayDirectionZ = Math.cos(runwayAngle);
const fighterDistanceFromCenter = -27;
airplaneGroup.position.set(
runwayCenterX + runwayDirectionX * fighterDistanceFromCenter,
-8.0,
runwayCenterZ + runwayDirectionZ * fighterDistanceFromCenter
);
airplaneGroup.rotation.y = runwayAngle;
carrierGroup.add(airplaneGroup);

const { helicopterGroup } = buildUH1YModel();
helicopterGroup.scale.setScalar(0.3);
helicopterGroup.position.set(-50, -9.1, 100);
carrierGroup.add(helicopterGroup);

disableModelArtificialLights(carrierGroup);
disableModelArtificialLights(airplaneGroup);
disableModelArtificialLights(helicopterGroup);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(-380, 240, 520);
camera.lookAt(0, -20, 0);
scene.add(camera);

const sunLight = new THREE.DirectionalLight(0xfff2c6, 7.5);
sunLight.position.set(700, 900, 380);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 4096;
sunLight.shadow.mapSize.height = 4096;
sunLight.shadow.camera.near = 10;
sunLight.shadow.camera.far = 2600;
sunLight.shadow.camera.left = -700;
sunLight.shadow.camera.right = 700;
sunLight.shadow.camera.top = 700;
sunLight.shadow.camera.bottom = -700;
sunLight.shadow.bias = -0.00008;
sunLight.shadow.normalBias = 0.02;

const sunTarget = new THREE.Object3D();
sunTarget.position.set(0, -20, 0);
scene.add(sunTarget);
sunLight.target = sunTarget;
scene.add(sunLight);

const sunVisual = new THREE.Mesh(
new THREE.SphereGeometry(42, 32, 32),
new THREE.MeshBasicMaterial({ color: 0xffd27a })
);
sunVisual.position.copy(sunLight.position);
scene.add(sunVisual);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambientLight);

const hemisphere = new THREE.HemisphereLight(0x7fb2ff, 0x0a1622, 0.55);
scene.add(hemisphere);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(new THREE.Color(0x87ceeb));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);

document.getElementById("WebGL-output").appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 1400;
controls.minDistance = 120;
controls.target.set(0, -18, 0);

function onWindowResize() {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
}

window.addEventListener("resize", onWindowResize);

function renderScene() {
requestAnimationFrame(renderScene);
controls.update();
radarSpinner.rotation.y += 0.01;
renderer.render(scene, camera);
}

renderScene();
}

window.onload = init;
</script>
</body>
</html>
